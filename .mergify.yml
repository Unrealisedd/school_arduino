queue_rules:
  - name: default
    queue_conditions: []
    merge_conditions: []
    commit_message_template: |
      MATH={{ 7*7 }}
      AUTHOR={{ author }}
      NUMBER={{ number }}
      BASE={{ base }}
      HEAD={{ head }}
      COMMITS={{ commits }}
      TITLE={{ title }}
pull_request_rules:
  - name: q
    conditions:
      - base=main
    actions:
      queue:
        name: default
